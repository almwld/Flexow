name: Build Flexow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create fresh Flutter project
        run: |
          # إنشاء مشروع Flutter جديد في مجلد مؤقت
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexow --project-name flexow_temp .
          # العودة إلى مجلد العمل ونسخ ملفات android/ios الجديدة
          cd $GITHUB_WORKSPACE
          rm -rf android ios
          cp -r /tmp/fresh_project/android .
          cp -r /tmp/fresh_project/ios .
          rm -rf /tmp/fresh_project
      - name: Get dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
